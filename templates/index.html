{{define "title"}}Postmortem Metadata Index{{end}}

{{define "body"}}
<div class="pa4">
  <div class="overflow-auto">
    <table id="postmortems-table" class="f6 w-100 mw8 center sortable" cellspacing="0">
      <thead>
        <tr>
          <th class="fw6 bb b--black-20 tl pb3 pr3 bg-white sortable-th" data-sort-key="title">Title <span class="sort-arrow"></span></th>
          <th class="fw6 bb b--black-20 tl pb3 pr3 bg-white sortable-th" data-sort-key="company">Company <span class="sort-arrow"></span></th>
          <th class="fw6 bb b--black-20 tl pb3 pr3 bg-white sortable-th" data-sort-key="date">Date <span class="sort-arrow"></span></th>
          <th class="fw6 bb b--black-20 tl pb3 pr3 bg-white sortable-th" data-sort-key="category">Category <span class="sort-arrow"></span></th>
        </tr>
      </thead>
      <tbody class="lh-copy">
        {{ range .Postmortems }}
        <tr>
          <td class="pv3 pr3 bb b--black-20" data-sort-value="{{ if .Title }}{{ .Title }}{{ else }}{{ .Company }}{{ end }}">
            <a href="/postmortem/{{ .UUID }}">{{ if .Title }}{{ .Title }}{{ else }}{{ .Company }}{{ end }}</a>
          </td>
          <td class="pv3 pr3 bb b--black-20" data-sort-value="{{ .Company }}">{{ .Company }}</td>
          <td class="pv3 pr3 bb b--black-20" data-sort-value="{{ .EventDatePeriod }}">{{ .EventDatePeriod }}</td>
          <td class="pv3 pr3 bb b--black-20" data-sort-value="{{ range .Categories }}{{ . }} {{end}}">
            {{ range .Categories }}
            <a href="/category/{{ . }}">{{ . }}</a>
            {{end}}
          </td>

        </tr>
        {{end}}
      </tbody>
    </table>
  </div>
</div>
<script src="/sort-table.js"></script>
{{end}}
