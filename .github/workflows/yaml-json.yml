name: yaml-json
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: reviewdog/action-yamllint@v1
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-check
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Install yq
        uses: dcarbone/install-yq-action@v1.3.1
      - name: Format YAML files with yq
        run: |
          # Format YAML in place. Skip vendor and node_modules in case they appear later.
          find . \( -name "*.yml" -o -name "*.yaml" \) \
            -not -path "./vendor/*" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*" | while read -r file; do
            echo "Formatting $file"
            yq -iP '.' "$file"
          done
      - name: Format JSON files with yq
        run: |
          # yq formats JSON with -o=json. go.sum is text, not JSON, so glob only *.json.
          find . -name "*.json" \
            -not -path "./vendor/*" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*" | while read -r file; do
            echo "Formatting $file"
            yq -iP -o=json '.' "$file"
          done
      - name: Commit formatting changes
        if: github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'style: format YAML and JSON with yq'
          # The default GITHUB_TOKEN cannot edit files under .github/workflows.
          file_pattern: '*.yml *.yaml *.json :!.github/workflows/*'
          commit_author: GitHub Actions <actions@github.com>
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
